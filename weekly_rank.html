<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤闽浙代运营商周排名看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}

.hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:18px 20px;text-align:center}
.hdr h1{font-size:20px;margin-bottom:4px}
.hdr .dt{font-size:12px;opacity:.8}

.ct{padding:16px;max-width:900px;margin:0 auto}

.sum-strip{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.sum-chip{flex:0 0 auto;background:#fff;border-radius:12px;padding:10px 14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:100px}
.sum-chip .pos{font-size:11px;color:#aaa;margin-bottom:2px}
.sum-chip .nm{font-size:15px;font-weight:700}
.sum-chip .sc{font-size:11px;color:#bbb;margin-top:1px}
.sum-chip.c1 .nm{color:#c09b0a}.sum-chip.c2 .nm{color:#607d8b}.sum-chip.c3 .nm{color:#8d6e63}
.sum-chip.c4 .nm,.sum-chip.c5 .nm,.sum-chip.c6 .nm{color:#e53935}

.rcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid #e0e0e0;transition:box-shadow-shadow .2s}
.rcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.rcard.r1{border-left-color:#f6c90e}.rcard.r2{border-left-color:#9e9e9e}.rcard.r3{border-left-color:#cd7f32}
.rcard.r4,.rcard.r5,.rcard.r6{border-left-color:#ef5350}

.rcard-hd{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.badge.r1{background:#f6c90e;color:#7a6100}.badge.r2{background:#9e9e9e}.badge.r3{background:#cd7f32}
.badge.r4,.badge.r5,.badge.r6{background:#ef5350}
.rname{font-size:17px;font-weight:700}
.ravg{font-size:12px;color:#aaa}

.cat-bar{display:flex;gap:4px;margin-bottom:10px}
.cat-seg{flex:1;border-radius:6px;text-align:center;color:#fff;font-size:11px;font-weight:600;padding:4px 0}
.cat-seg.core{background:#1565c0}.cat-seg.health{background:#2e7d32}.cat-seg.process{background:#6a1b9a}

.tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:10px}
.tag.g{background:#e8f5e9;color:#2e7d32}.tag.r{background:#ffebee;color:#c62828}

.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(min-width:560px){.mgrid{grid-template-columns:repeat(6,1fr)}}

.mi{text-align:center;padding:8px 4px;border-radius:8px;background:#f8f9fa}
.mi-lb{font-size:10px;color:#aaa;margin-bottom:2px;line-height:1.2}
.mi-vl{font-size:14px;font-weight:700}
.mi-vl.g{color:#2e7d32}.mi-vl.y{color:#e65100}.mi-vl.r{color:#c62828}
.mi-pts{font-size:11px;font-weight:700;margin-top:1px}
.mi-rk{font-size:10px;color:#bbb}
.mi-rk.t{color:#2e7d32;font-weight:600}.mi-rk.bt{color:#c62828;font-weight:600}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);font-size:12px}
th{background:#1a237e;color:#fff;padding:9px 6px;text-align:center;white-space:nowrap}
td{padding:7px 5px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tr:hover td{background:#f5f6ff}
.tc-g{color:#2e7d32;font-weight:600}.tc-y{color:#e65100}.tc-r{color:#c62828}

.ftr{text-align:center;padding:16px;font-size:11px;color:#bbb}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏆 粤闽浙代运营商周排名看板</h1>
  <div class="dt">数据截至 2026-05-27 &nbsp;·&nbsp; 核心40% + 健康20% + 过程40% 加权</div>
</div>

<div class="ct">
  <div class="sum-strip" id="sumStrip"></div>
  <div id="rankCards"></div>
</div>

<div class="ftr">
  GTV · CPC新签 · CPC消耗 · MEM续约 · 剔除率 · 感知风控 · 工单闭环 · 满编率 · 经营评分 · 好店动销 · BML<br>
  数据来源：PC业绩看板 / 好店底表 / BML组织明细 / 经营评分快照 / 动销存档 / 感知风控截图
</div>

<script src="weekly_rank_data.js"></script>
<script>
function vc(r){ return r<=2?'g':r<=3?'y':'r'; }
function rc(r){ return r<=2?'t':r>=5?'bt':''; }

function renderStrip(){
  document.getElementById('sumStrip').innerHTML = RANKING_DATA.operators.map((op,i)=>`
    <div class="sum-chip ${['c1','c2','c3','c4','c5','c6'][i]||'c6'}">
      <div class="pos">第${i+1}名</div>
      <div class="nm">${op.name}</div>
      <div class="sc">${op.cats.total}分</div>
    </div>`).join('');
}

function renderCards(){
  document.getElementById('rankCards').innerHTML = RANKING_DATA.operators.map((op,i)=>{
    const r = i+1;
    const topK = METRIC_ORDER.filter(k=>op.metrics[k].rank<=2).map(k=>op.metrics[k].label);
    const botK = METRIC_ORDER.filter(k=>op.metrics[k].rank>=5).map(k=>op.metrics[k].label);
    const catBar = Object.entries(op.cats).filter(([k])=>k!=='total').map(([cat, d])=>`
      <div class="cat-seg ${cat}" style="opacity:${0.3+d.pts/d.max*0.7}">
        ${cat==='core'?'核心':cat==='health'?'健康':'过程'} ${d.pts}/${d.max}
      </div>`).join('');
    return `<div class="rcard r${r}">
      <div class="rcard-hd">
        <div class="badge r${r}">${r}</div>
        <div><div class="rname">${op.name}</div><div class="ravg">总分 ${op.cats.total}</div></div>
      </div>
      <div class="cat-bar">${catBar}</div>
      <div class="tagrow">
        ${topK.map(k=>`<span class="tag g">💪 ${k}</span>`).join('')}
        ${botK.map(k=>`<span class="tag r">⚠️ ${k}</span>`).join('')}
      </div>
      <div class="mgrid">
        ${METRIC_ORDER.map(k=>{
          const m = op.metrics[k];
          return `<div class="mi">
            <div class="mi-lb">${m.label}</div>
            <div class="mi-vl ${vc(m.rank)}">${(op.raw[k]*100).toFixed(1)}%</div>
            <div class="mi-pts ${vc(m.rank)}">${m.pts}/${RANKING_DATA.weights[k]}分</div>
            <div class="mi-rk ${rc(m.rank)}">第${m.rank}/6</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

renderStrip();
renderCards();
</script>
</body>
</html>
