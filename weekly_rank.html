<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤闽浙代运营商周排名看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}

.hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:18px 20px;text-align:center}
.hdr h1{font-size:20px;margin-bottom:4px}
.hdr .dt{font-size:12px;opacity:.8}

.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #eee;padding:0 16px;overflow-x:auto}
.tab-btn{padding:12px 20px;border:none;background:none;font-size:14px;cursor:pointer;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#1a237e;border-bottom-color:#1a237e;font-weight:700}

.ct{padding:16px;max-width:900px;margin:0 auto}
.tab-pane{display:none}.tab-pane.active{display:block}

/* summary strip */
.sum-strip{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.sum-chip{flex:0 0 auto;background:#fff;border-radius:12px;padding:10px 16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);min-width:110px}
.sum-chip .pos{font-size:11px;color:#999;margin-bottom:2px}
.sum-chip .nm{font-size:15px;font-weight:700}
.sum-chip .sc{font-size:11px;color:#aaa;margin-top:1px}
.sum-chip.gold .nm{color:#c09b0a}
.sum-chip.silver .nm{color:#607d8b}
.sum-chip.bronze .nm{color:#8d6e63}
.sum-chip.warning .nm{color:#e53935}

/* rank card */
.rcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid #e0e0e0;transition:box-shadow .2s}
.rcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.rcard.r1{border-left-color:#f6c90e}.rcard.r2{border-left-color:#9e9e9e}.rcard.r3{border-left-color:#cd7f32}
.rcard.r4,.rcard.r5,.rcard.r6{border-left-color:#ef5350}

.rcard-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.badge.r1{background:#f6c90e;color:#7a6100}.badge.r2{background:#9e9e9e}.badge.r3{background:#cd7f32}
.badge.r4,.badge.r5,.badge.r6{background:#ef5350}
.rname{font-size:18px;font-weight:700}
.ravg{font-size:12px;color:#aaa}

.tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:10px}
.tag.good{background:#e8f5e9;color:#2e7d32}
.tag.bad{background:#ffebee;color:#c62828}

.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(min-width:560px){.mgrid{grid-template-columns:repeat(6,1fr)}}

.mi{text-align:center;padding:8px 4px;border-radius:8px;background:#f8f9fa}
.mi-lb{font-size:10px;color:#aaa;margin-bottom:2px;line-height:1.2}
.mi-vl{font-size:14px;font-weight:700}
.mi-vl.g{color:#2e7d32}.mi-vl.y{color:#e65100}.mi-vl.r{color:#c62828}
.mi-rk{font-size:10px;color:#bbb}
.mi-rk.t{color:#2e7d32;font-weight:600}.mi-rk.bt{color:#c62828;font-weight:600}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:12px}
th{background:#1a237e;color:#fff;padding:8px 6px;text-align:center;white-space:nowrap}
td{padding:7px 5px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tr:hover td{background:#f5f6ff}
.tc-g{color:#2e7d32;font-weight:600}.tc-r{color:#c62828}.tc-y{color:#e65100}

.ftr{text-align:center;padding:16px;font-size:11px;color:#bbb}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏆 粤闽浙代运营商周排名看板</h1>
  <div class="dt">数据截至 2026-05-27 &nbsp;·&nbsp; 11项指标平均排名（强排）</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('rank',this)">📊 周排名</button>
  <button class="tab-btn" onclick="showTab('table',this)">📋 明细表格</button>
</div>

<div class="ct">

  <div class="tab-pane active" id="rank">
    <div class="sum-strip" id="sumStrip"></div>
    <div id="rankCards"></div>
  </div>

  <div class="tab-pane" id="table">
    <div class="tbl-wrap"><table id="detailTable"></table></div>
  </div>

</div>

<div class="ftr">
  GTV · CPC新签 · CPC消耗 · MEM续约 · 剔除率 · 感知风控 · 工单闭环 · 满编率 · 经营评分 · 好店动销 · BML<br>
  数据来源：PC业绩看板 / 好店底表 / BML组织明细 / 经营评分快照 / 动销存档 / 感知风控截图
</div>

<script src="weekly_rank_data.js"></script>
<script>
function vc(rank, inverted){
  // rank 1=best; inverted means lower source value is better
  if(rank<=2) return 'g';
  if(rank<=3) return 'y';
  return 'r';
}
function rc(rank){ return rank<=2?'t':rank>=5?'bt':''; }
function medalClass(i){ return ['gold','silver','bronze','','warning','warning'][i]||'warning'; }

function renderStrip(){
  const el = document.getElementById('sumStrip');
  el.innerHTML = RANKING_DATA.operators.map((op,i)=>`
    <div class="sum-chip ${medalClass(i)}">
      <div class="pos">第${i+1}名</div>
      <div class="nm">${op.name}</div>
      <div class="sc">均排 ${op.avgRank}</div>
    </div>`).join('');
}

function renderCards(){
  const el = document.getElementById('rankCards');
  el.innerHTML = RANKING_DATA.operators.map(op=>{
    const mkeys = METRIC_ORDER;
    return `<div class="rcard r${op.rank}">
      <div class="rcard-hd">
        <div class="badge r${op.rank}">${op.rank}</div>
        <div>
          <div class="rname">${op.name}</div>
          <div class="ravg">11项均排 ${op.avgRank}</div>
        </div>
      </div>
      <div class="tagrow">
        ${op.highlights.map(h=>`<span class="tag good">💪 ${h}</span>`).join('')}
        ${op.weaknesses.map(w=>`<span class="tag bad">⚠️ ${w}</span>`).join('')}
      </div>
      <div class="mgrid">
        ${mkeys.map(k=>{
          const m = op.metrics[k];
          const cls = vc(m.rank, m.inverted);
          return `<div class="mi">
            <div class="mi-lb">${m.label}</div>
            <div class="mi-vl ${cls}">${m.value}${m.unit}</div>
            <div class="mi-rk ${rc(m.rank)}">第${m.rank}/6</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderTable(){
  const ops = RANKING_DATA.operators;
  const mkeys = METRIC_ORDER;
  let html = '<thead><tr><th>排名</th><th>代运营商</th><th>均排</th>';
  for(const k of mkeys) html += `<th>${ops[0].metrics[k].label}</th>`;
  html += '</tr></thead><tbody>';
  for(const op of ops){
    html += `<tr><td><b>${op.rank}</b></td><td style="font-weight:600">${op.name}</td><td><b>${op.avgRank}</b></td>`;
    for(const k of mkeys){
      const m = op.metrics[k];
      html += `<td class="tc-${vc(m.rank)}">${m.value}${m.unit}<br><span style="font-size:10px;color:#bbb">第${m.rank}</span></td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('detailTable').innerHTML = html;
}

function showTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

renderStrip();
renderCards();
renderTable();
</script>
</body>
</html>
