<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤闽浙代运营商绩效看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}

/* Header */
.hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:19px;flex:1}
.hdr .dt{font-size:12px;opacity:.8;white-space:nowrap}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8eaf6;padding:0 16px;overflow-x:auto}
.tab-btn{padding:12px 18px;border:none;background:none;font-size:14px;cursor:pointer;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#1a237e;border-bottom-color:#1a237e;font-weight:700}

.ct{padding:16px;max-width:960px;margin:0 auto}
.pane{display:none}.pane.active{display:block}

/* ===== WEEKLY RANK ===== */
.sum-strip{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.sum-chip{flex:0 0 auto;background:#fff;border-radius:12px;padding:10px 14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:100px}
.sum-chip .pos{font-size:11px;color:#aaa;margin-bottom:2px}
.sum-chip .nm{font-size:14px;font-weight:700}
.sum-chip .sc{font-size:11px;color:#bbb;margin-top:1px}
.sum-chip.c1 .nm{color:#c09b0a} .sum-chip.c2 .nm{color:#607d8b} .sum-chip.c3 .nm{color:#8d6e63}
.sum-chip.c4 .nm,.sum-chip.c5 .nm,.sum-chip.c6 .nm{color:#e53935}

.rcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid #e0e0e0;transition:box-shadow .2s}
.rcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.rcard.r1{border-left-color:#f6c90e}.rcard.r2{border-left-color:#9e9e9e}.rcard.r3{border-left-color:#cd7f32}
.rcard.r4,.rcard.r5,.rcard.r6{border-left-color:#ef5350}

.rcard-hd{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.badge.r1{background:#f6c90e;color:#7a6100}.badge.r2{background:#9e9e9e}.badge.r3{background:#cd7f32}
.badge.r4,.badge.r5,.badge.r6{background:#ef5350}
.rname{font-size:17px;font-weight:700}
.ravg{font-size:12px;color:#aaa}

.tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:10px}
.tag.g{background:#e8f5e9;color:#2e7d32}.tag.r{background:#ffebee;color:#c62828}

.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media(min-width:540px){.mgrid{grid-template-columns:repeat(6,1fr)}}
.mi{text-align:center;padding:7px 3px;border-radius:8px;background:#f8f9fa}
.mi-lb{font-size:9px;color:#aaa;margin-bottom:1px;line-height:1.2}
.mi-vl{font-size:13px;font-weight:700}
.mi-vl.g{color:#2e7d32}.mi-vl.y{color:#e65100}.mi-vl.r{color:#c62828}
.mi-rk{font-size:10px;color:#ccc}
.mi-rk.t{color:#2e7d32;font-weight:600}.mi-rk.bt{color:#c62828;font-weight:600}

/* ===== MONTHLY SCORE ===== */
.ms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ms-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ms-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ms-nm{font-size:17px;font-weight:700}
.ms-rank{font-size:11px;color:#aaa}
.ms-total{font-size:36px;font-weight:800}
.ms-total.s90{color:#16a34a}.ms-total.s75{color:#1a73e8}.ms-total.s60{color:#e65100}.ms-total.slow{color:#c62828}
.ms-bar{display:flex;height:20px;border-radius:10px;overflow:hidden;margin:10px 0 12px;gap:2px}
.ms-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;transition:width .5s}

.dim-rows{}
.dim-row{margin-bottom:10px}
.dim-label{font-size:11px;font-weight:700;color:#555;margin-bottom:5px;display:flex;justify-content:space-between}
.dim-items{display:flex;flex-wrap:wrap;gap:4px}
.dim-item{font-size:11px;padding:3px 7px;border-radius:8px;background:#f5f5f5;color:#444}
.dim-item span{font-weight:700}

/* ===== RULES ===== */
.rules-box{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.rules-box h3{font-size:15px;margin-bottom:4px}
.rules-box p{font-size:12px;color:#888;margin-bottom:14px}
.rules-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rules-tbl th{background:#e8eaf6;padding:8px;text-align:left;font-size:12px}
.rules-tbl td{padding:7px 8px;border-bottom:1px solid #f0f0f0}
.rules-tbl input{width:62px;padding:4px 6px;border:1px solid #ddd;border-radius:5px;text-align:center;font-size:13px}
.rules-save{background:#1a237e;color:#fff;border:none;padding:9px 24px;border-radius:7px;cursor:pointer;font-size:14px;margin-top:12px}
.rules-save:hover{background:#283593}
.applied-note{display:none;color:#2e7d32;font-size:12px;margin-top:8px}

/* Table */
.tbl-wrap{overflow-x:auto}
.dtbl{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);font-size:12px}
.dtbl th{background:#1a237e;color:#fff;padding:9px 6px;text-align:center;white-space:nowrap}
.dtbl td{padding:7px 5px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap}
.dtbl tr:hover td{background:#f5f6ff}
.tc-g{color:#2e7d32;font-weight:600}.tc-y{color:#e65100}.tc-r{color:#c62828}

.ftr{text-align:center;padding:16px;font-size:11px;color:#bbb}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏆 粤闽浙代运营商绩效看板</h1>
  <div class="dt" id="hdrDate"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('weekly',this)">📊 周排名</button>
  <button class="tab-btn" onclick="showTab('monthly',this)">📈 月度评分</button>
  <button class="tab-btn" onclick="showTab('rules',this)">⚙️ 评分规则</button>
  <button class="tab-btn" onclick="showTab('table',this)">📋 明细表格</button>
</div>

<div class="ct">
  <div class="pane active" id="weekly">
    <div class="sum-strip" id="sumStrip"></div>
    <div id="rankCards"></div>
  </div>

  <div class="pane" id="monthly">
    <div class="ms-grid" id="monthlyGrid"></div>
  </div>

  <div class="pane" id="rules">
    <div class="rules-box">
      <h3>📐 指标权重配置</h3>
      <p>修改各指标权重后点击「应用规则」，月度评分自动重算（总权重应等于100）</p>
      <table class="rules-tbl">
        <thead><tr><th>维度</th><th>指标</th><th>权重(%)</th><th>达标线</th><th>满分线</th></tr></thead>
        <tbody id="rulesTbody"></tbody>
      </table>
      <button class="rules-save" onclick="applyRules()">✅ 应用规则，重算评分</button>
      <div class="applied-note" id="appliedNote">✅ 规则已应用，评分已重算</div>
    </div>
  </div>

  <div class="pane" id="table">
    <div class="tbl-wrap"><table class="dtbl" id="detailTbl"></table></div>
  </div>
</div>

<div class="ftr">数据截至 <span id="ftrDate"></span> · GTV · CPC新签 · CPC消耗 · MEM续约 · 剔除率 · 感知风控 · 工单闭环 · 满编率 · 经营评分 · 好店动销 · BML</div>

<script src="perf_data.js"></script>
<script>
// ---------- helpers ----------
const OPS = PERF_DATA.ops;
const ML = PERF_DATA.metricLabels;
const MKEYS = ['gtv','cpc_new','cpc_consume','mem','loss','fengkong','work','staff','score','dongxiao','bml'];

document.getElementById('hdrDate').textContent = '数据截至 ' + PERF_DATA.date;
document.getElementById('ftrDate').textContent = PERF_DATA.date;

function pct(v){ return (v*100).toFixed(1)+'%'; }
function scoreColor(s){ return s>=85?'g':s>=70?'y':'r'; }

function rankAll(ops, key, invert){
  const sorted = [...ops].sort((a,b)=> invert ? a.raw[key]-b.raw[key] : b.raw[key]-a.raw[key]);
  const rmap={};
  sorted.forEach((op,i)=>rmap[op.name]=i+1);
  return rmap;
}

// Compute weekly ranks from raw data
function computeWeekRanks(){
  const inverted = {loss:true, fengkong:true, bml:true};
  const ranks = {};
  OPS.forEach(op=>ranks[op.name]={});
  MKEYS.forEach(k=>{
    const rmap = rankAll(OPS, k, !!inverted[k]);
    OPS.forEach(op=>ranks[op.name][k]=rmap[op.name]);
  });
  const avgRanks = {};
  OPS.forEach(op=>{
    const vals = Object.values(ranks[op.name]);
    avgRanks[op.name] = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length * 10)/10;
  });
  return {ranks, avgRanks};
}

function rkColor(r){ return r<=2?'g':r<=3?'y':'r'; }
function rkClass(r){ return r<=2?'t':r>=5?'bt':''; }

// ---------- WEEKLY ----------
function renderWeekly(){
  const {ranks, avgRanks} = computeWeekRanks();
  const sorted = [...OPS].sort((a,b)=>avgRanks[a.name]-avgRanks[b.name]);

  // strip
  const medals=['c1','c2','c3','c4','c5','c6'];
  document.getElementById('sumStrip').innerHTML = sorted.map((op,i)=>`
    <div class="sum-chip ${medals[i]}">
      <div class="pos">第${i+1}名</div>
      <div class="nm">${op.name}</div>
      <div class="sc">均排 ${avgRanks[op.name]}</div>
    </div>`).join('');

  // cards
  const inverted = {loss:true, fengkong:true, bml:true};
  document.getElementById('rankCards').innerHTML = sorted.map((op,idx)=>{
    const r = idx+1;
    const myRanks = ranks[op.name];
    const topK = MKEYS.filter(k=>myRanks[k]<=2).map(k=>ML[k].replace('完成率',''));
    const botK = MKEYS.filter(k=>myRanks[k]>=5).map(k=>ML[k].replace('完成率',''));
    return `<div class="rcard r${r}">
      <div class="rcard-hd">
        <div class="badge r${r}">${r}</div>
        <div><div class="rname">${op.name}</div><div class="ravg">11项均排 ${avgRanks[op.name]}</div></div>
      </div>
      <div class="tagrow">
        ${topK.map(k=>`<span class="tag g">💪 ${k}</span>`).join('')}
        ${botK.map(k=>`<span class="tag r">⚠️ ${k}</span>`).join('')}
      </div>
      <div class="mgrid">
        ${MKEYS.map(k=>{
          const inv = !!inverted[k];
          const raw = op.raw[k];
          const disp = (k==='loss'||k==='fengkong'||k==='bml') ? (raw*100).toFixed(1)+'%' : (raw*100).toFixed(1)+'%';
          const rk = myRanks[k];
          return `<div class="mi">
            <div class="mi-lb">${ML[k].replace('完成率','')}</div>
            <div class="mi-vl ${rkColor(rk)}">${disp}</div>
            <div class="mi-rk ${rkClass(rk)}">第${rk}/6</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ---------- MONTHLY ----------
function scoreRate(rate, base, full){ 
  if(rate>=full) return 100;
  if(rate>=base) return 60+(rate-base)/(full-base)*40;
  return Math.max(0, rate/base*60);
}
function scoreLow(val, bad, good){
  if(val<=good) return 100;
  if(val>=bad) return 0;
  return (bad-val)/(bad-good)*100;
}

function calcMonthly(op){
  const d = op.raw;
  const T = PERF_DATA.thresholds;
  const W = PERF_DATA.weights;
  const s = {};
  MKEYS.forEach(k=>{
    const t = T[k];
    let raw = d[k];
    let pts;
    if(t.invert){ pts = scoreLow(raw, t.bad, t.good); }
    else { raw = Math.min(raw, t.full*1.5); pts = scoreRate(raw, t.base, t.full); }
    s[k] = Math.round(pts * W[k] / 100 * 10)/10;
  });
  const core = s.gtv+s.cpc_new+s.cpc_consume+s.mem;
  const health = s.loss+s.fengkong;
  const process = s.work+s.staff+s.score+s.dongxiao+s.bml;
  const total = Math.round((core+health+process)*10)/10;
  return {core:Math.round(core*10)/10, health:Math.round(health*10)/10, process:Math.round(process*10)/10, total, detail:s};
}

function renderMonthly(){
  const scored = OPS.map(op=>({...op, ms: calcMonthly(op)})).sort((a,b)=>b.ms.total-a.ms.total);
  const maxTotal = Math.max(...scored.map(o=>o.ms.total));
  const CAT = PERF_DATA.categories;

  document.getElementById('monthlyGrid').innerHTML = scored.map((op,i)=>{
    const ms = op.ms;
    const cls = ms.total>=85?'s90':ms.total>=70?'s75':ms.total>=60?'s60':'slow';
    const coreW = PERF_DATA.weights.gtv+PERF_DATA.weights.cpc_new+PERF_DATA.weights.cpc_consume+PERF_DATA.weights.mem;
    const healthW = PERF_DATA.weights.loss+PERF_DATA.weights.fengkong;
    const processW = 100-coreW-healthW;
    const corePct = ms.core/coreW*100;
    const healthPct = ms.health/healthW*100;
    const processPct = ms.process/processW*100;

    return `<div class="ms-card">
      <div class="ms-hd">
        <div><div class="ms-nm">${op.name}</div><div class="ms-rank">月度第${i+1}名</div></div>
        <div class="ms-total ${cls}">${ms.total}</div>
      </div>
      <div class="ms-bar">
        <div class="ms-bar-seg" style="width:${coreW}%;background:#1565c0;opacity:${0.4+corePct/100*0.6}">核心${ms.core}</div>
        <div class="ms-bar-seg" style="width:${healthW}%;background:#2e7d32;opacity:${0.4+healthPct/100*0.6}">健康${ms.health}</div>
        <div class="ms-bar-seg" style="width:${processW}%;background:#6a1b9a;opacity:${0.4+processPct/100*0.6}">过程${ms.process}</div>
      </div>
      <div class="dim-rows">
        ${Object.entries(CAT).map(([catK, cat])=>{
          const items = cat.keys.map(k=>`<span class="dim-item">${ML[k].replace('完成率','')}<span> ${ms.detail[k]}/${PERF_DATA.weights[k]}</span></span>`).join('');
          const catTotal = cat.keys.reduce((s,k)=>s+ms.detail[k],0);
          const catMax = cat.keys.reduce((s,k)=>s+PERF_DATA.weights[k],0);
          return `<div class="dim-row">
            <div class="dim-label" style="color:${cat.color}"><span>${cat.label}</span><span>${Math.round(catTotal*10)/10}/${catMax}分</span></div>
            <div class="dim-items">${items}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ---------- RULES ----------
function renderRules(){
  const T = PERF_DATA.thresholds;
  const W = PERF_DATA.weights;
  const CAT = PERF_DATA.categories;
  let rows = '';
  Object.entries(CAT).forEach(([catK, cat])=>{
    cat.keys.forEach((k,i)=>{
      const t = T[k];
      const threshHtml = t.invert
        ? `差:<input id="t_bad_${k}" value="${(t.bad*100).toFixed(0)}">% 好:<input id="t_good_${k}" value="${(t.good*100).toFixed(0)}">%`
        : `达标:<input id="t_base_${k}" value="${(t.base*100).toFixed(0)}">% 满分:<input id="t_full_${k}" value="${(t.full*100).toFixed(0)}">%`;
      rows += `<tr>
        ${i===0?`<td rowspan="${cat.keys.length}" style="color:${cat.color};font-weight:700">${cat.label}</td>`:''}
        <td>${ML[k]}</td>
        <td><input id="w_${k}" value="${W[k]}" style="width:50px"></td>
        <td colspan="2">${threshHtml}</td>
      </tr>`;
    });
  });
  document.getElementById('rulesTbody').innerHTML = rows;
}

function applyRules(){
  const W = PERF_DATA.weights;
  const T = PERF_DATA.thresholds;
  MKEYS.forEach(k=>{
    const wi = document.getElementById('w_'+k);
    if(wi) W[k] = parseFloat(wi.value)||W[k];
    const t = T[k];
    if(t.invert){
      const bi=document.getElementById('t_bad_'+k), gi=document.getElementById('t_good_'+k);
      if(bi) t.bad = parseFloat(bi.value)/100;
      if(gi) t.good = parseFloat(gi.value)/100;
    } else {
      const bsi=document.getElementById('t_base_'+k), fi=document.getElementById('t_full_'+k);
      if(bsi) t.base = parseFloat(bsi.value)/100;
      if(fi) t.full = parseFloat(fi.value)/100;
    }
  });
  renderMonthly();
  renderTable();
  const note = document.getElementById('appliedNote');
  note.style.display = 'block';
  setTimeout(()=>note.style.display='none', 3000);
}

// ---------- TABLE ----------
function renderTable(){
  const scored = OPS.map(op=>({...op, ms: calcMonthly(op)})).sort((a,b)=>b.ms.total-a.ms.total);
  const {ranks} = computeWeekRanks();
  let html = '<thead><tr><th>月度排名</th><th>代运营商</th><th>月度评分</th><th>周排名</th>';
  MKEYS.forEach(k=>html+=`<th>${ML[k].replace('完成率','')}</th>`);
  html += '</tr></thead><tbody>';
  scored.forEach((op,i)=>{
    const myRanks = ranks[op.name];
    html += `<tr><td><b>${i+1}</b></td><td style="font-weight:600">${op.name}</td><td><b>${op.ms.total}</b></td><td>${op.weekRank||'?'}</td>`;
    MKEYS.forEach(k=>{
      const rk = myRanks[k];
      const cls = rk<=2?'tc-g':rk>=5?'tc-r':'tc-y';
      html += `<td class="${cls}">${(op.raw[k]*100).toFixed(1)}%<br><span style="font-size:10px;color:#bbb">第${rk}</span></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('detailTbl').innerHTML = html;
}

// ---------- TAB SWITCH ----------
function showTab(id, btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ---------- INIT ----------
renderWeekly();
renderMonthly();
renderRules();
renderTable();
</script>
</body>
</html>
