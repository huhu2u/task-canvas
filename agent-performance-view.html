<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:#f5f7fa;min-height:100vh}

/* ===== Login Page ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#ffd54f 0%,#ffb300 100%)}
.login-card{background:#fff;border-radius:16px;padding:48px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.12);text-align:center}
.login-logo{width:56px;height:56px;background:#ffb300;border-radius:12px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.login-sub{font-size:13px;color:#999;margin-bottom:32px}
.pin-input{width:100%;padding:14px 20px;font-size:24px;letter-spacing:12px;text-align:center;border:2px solid #e8e8e8;border-radius:10px;outline:none;transition:border .2s}
.pin-input:focus{border-color:#ffb300}
.login-btn{width:100%;padding:14px;margin-top:20px;background:#ffb300;color:#fff;font-size:16px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#ffa000}
.login-btn:active{transform:scale(.98)}
.login-err{color:#e53935;font-size:13px;margin-top:12px;min-height:20px}

/* ===== Dashboard ===== */
.dash{display:none;padding:16px;max-width:640px;margin:0 auto}
.dash-hdr{text-align:center;margin-bottom:20px}
.dash-hdr h1{font-size:18px;color:#333;font-weight:700}
.dash-hdr .date{font-size:12px;color:#999;margin-top:4px}

/* Top Card */
.top-card{background:linear-gradient(135deg,#ffb300,#ff8f00);border-radius:14px;padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.top-card::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.1);border-radius:50%}
.top-name{font-size:20px;font-weight:700}
.top-person{font-size:13px;opacity:.85;margin-top:4px}
.top-rank{position:absolute;top:20px;right:24px;font-size:36px;font-weight:900;opacity:.9}
.top-rank span{font-size:13px;font-weight:400;opacity:.7}

/* Section */
.section{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.section-title{font-size:14px;font-weight:700;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Metric Cards */
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.metric-item{background:#f9fafb;border-radius:10px;padding:12px;text-align:center}
.metric-item .mi-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-item .mi-val{font-size:16px;font-weight:700;color:#333}
.metric-item .mi-sub{font-size:10px;color:#999;margin-top:2px}
.metric-item .mi-rate{font-size:12px;font-weight:600;margin-top:4px;padding:2px 6px;border-radius:4px;display:inline-block}
.rate-g{background:#e8f5e9;color:#2e7d32}
.rate-y{background:#fff8e1;color:#f57f17}
.rate-r{background:#ffebee;color:#c62828}

/* Gap */
.gap-row{display:flex;justify-content:space-around;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.gap-item{text-align:center}
.gap-item .gi-label{font-size:10px;color:#999}
.gap-item .gi-val{font-size:13px;font-weight:600;color:#e53935}
.gap-item .gi-val.ok{color:#43a047}

/* Project Table */
.proj-table{width:100%;border-collapse:collapse;font-size:12px}
.proj-table th{background:#f5f5f5;padding:8px 6px;text-align:left;font-weight:600;color:#666;border-bottom:1px solid #eee}
.proj-table td{padding:10px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.proj-table .rank-cell{font-size:18px;font-weight:700;width:40px;text-align:center}
.rank-g{color:#2e7d32}
.rank-y{color:#f57f17}
.rank-r{color:#c62828}
.proj-table .pts-cell{font-weight:600;color:#555}

/* Summary */
.summary-card{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.summary-card .sum-label{font-size:13px;color:#2e7d32}
.summary-card .sum-pts{font-size:32px;font-weight:900;color:#1b5e20;margin:6px 0}
.summary-card .sum-rank{font-size:14px;color:#333}

/* Footer */
.dash-footer{text-align:center;padding:16px;font-size:11px;color:#bbb}

/* Responsive */
@media(max-width:400px){
  .metric-grid{grid-template-columns:1fr}
  .top-rank{font-size:28px}
}

/* Sales Detail Table */
.sales-table{width:100%;border-collapse:collapse;font-size:12px}
.sales-table th{background:#f0f4ff;padding:8px 6px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e0e0e0}
.sales-table td{padding:8px 6px;border-bottom:1px solid #f5f5f5}
.sales-table tr:hover{background:#fafbff}

.collapse-header .badge{background:#f0f0f0;color:#666;font-size:11px;padding:2px 8px;border-radius:10px}
.collapse-body{display:none;margin-top:8px}
.collapse-body.open{display:block}
.store-table{width:100%;border-collapse:collapse;font-size:11px}
.store-table th{background:#f9fafb;padding:6px 4px;text-align:left;font-weight:600;color:#888;border-bottom:1px solid #eee}
.store-table td{padding:6px 4px;border-bottom:1px solid #f8f8f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.show-all-btn{display:block;width:100%;text-align:center;padding:8px;color:#1976d2;font-size:12px;cursor:pointer;border:1px dashed #bbdefb;border-radius:6px;margin-top:8px;background:none}
.show-all-btn:hover{background:#e3f2fd}

/* Board Tables */
.board-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.board-table th{background:linear-gradient(135deg,#1a73e8,#1565c0);padding:10px 8px;text-align:right;font-weight:600;color:#fff;white-space:nowrap;font-size:11px}
.board-table td{padding:10px 8px;text-align:right;border-bottom:1px solid #e8eaf6;font-weight:600;color:#333;font-size:13px}
.board-table th:first-child,.board-table td:first-child{text-align:left}
.board-table tr:nth-child(even) td{background:#f5f8ff}
.board-label{font-size:14px;font-weight:700;color:#1a73e8;margin:14px 0 10px;padding-left:8px;border-left:4px solid #1a73e8}

/* Bar Chart */
.bar-section{margin-bottom:16px}
.bar-title{font-size:12px;font-weight:600;color:#555;margin-bottom:8px}
.bar-row{display:flex;align-items:center;margin-bottom:6px;height:24px}
.bar-label{width:50px;font-size:11px;color:#888;text-align:right;padding-right:8px;flex-shrink:0}
.bar-track{flex:1;height:20px;background:#f5f5f5;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-fill.self{background:linear-gradient(90deg,#1976d2,#42a5f5)}
.bar-fill.other{background:#e0e0e0}
.bar-name{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff}
.bar-name.other-name{color:#999}
</style>

const PROJ_METRICS = [
  {key:'score', label:'经营评分增量达标率', sort:'desc', val:(op)=>PROJ[op].score, customRank:false},
  {key:'dx',    label:'好店动销达标率', sort:'desc', val:(op)=>PROJ[op].dx.rate, customRank:true},
  {key:'zrq',   label:'职人码店转渗透率',sort:'desc',val:(op)=>PROJ[op].zrq.st},
  {key:'bml',   label:'BML Lose率',    sort:'asc',  val:(op)=>PROJ[op].bml},
  {key:'wpt',   label:'旺铺通好店开通率',sort:'desc',val:(op)=>PROJ[op].wpt.hdRate},
  {key:'fill',  label:'真实满编率',    sort:'desc',  val:(op)=>FILL_RATE[op]||0},
];

function calcProjRanks() {
  const ranks={}, pts={};
  for(const m of PROJ_METRICS){
    ranks[m.key]={};
    if(m.customRank){
      const above=OPS.filter(op=>m.val(op)>=100);
      const below=OPS.filter(op=>m.val(op)<100).sort((a,b)=>m.val(b)-m.val(a));
      if(above.length===OPS.length){
        const avg=(1+OPS.length)*OPS.length/2/OPS.length;
        for(const op of OPS) ranks[m.key][op]=avg;
      } else {
        const topScore=OPS.length;
        for(const op of above) ranks[m.key][op]=topScore;
        below.forEach((op,idx)=>{
          ranks[m.key][op]=OPS.length-(above.length+idx);
        });
      }
    } else {
      const sortVal = m.val;
      const s=[...OPS].sort((a,b)=>m.sort==='desc'?sortVal(b)-sortVal(a):sortVal(a)-sortVal(b));
      let i=0;
      while(i<s.length){
        let j=i;
        while(j<s.length && sortVal(s[j])===sortVal(s[i])) j++;
        const avgScore = [...Array(j-i)].reduce((sum,_,k)=>sum+(OPS.length-i-k),0)/(j-i);
        for(let k=i;k<j;k++) ranks[m.key][s[k]]=avgScore;
        i=j;
      }
    }
  }
  for(const op of OPS){
    pts[op]=0;
    for(const m of PROJ_METRICS) pts[op]+=ranks[m.key][op];
    pts[op]=Math.round(pts[op]*10)/10;
  }
  return {ranks, pts};
}

function getOverallRank(targetOp){
  const {pts}=calcProjRanks();
  const sorted=[...OPS].sort((a,b)=>pts[b]-pts[a]);
  return sorted.indexOf(targetOp)+1;
}

function getProjRankForMetric(targetOp, metricKey){
  const {ranks}=calcProjRanks();
  // Convert score to rank position (higher score = better rank)
  const scores={};
  OPS.forEach(op=>scores[op]=ranks[metricKey][op]);
  const sorted=[...OPS].sort((a,b)=>scores[b]-scores[a]);
  return sorted.indexOf(targetOp)+1;
}

    }
    html += '</tbody></table>';
    if(storeData.length > 20) {
      html += '<button class="show-all-btn" id="showAllBtn" onclick="showAllStores(\'' + op + '\')">查看全部 ' + storeData.length + ' 家门店</button>';
    }
    html += '</div></div>';
  }

  // ===== Module 4: Bar Chart Comparison =====
  html += renderBarChart(op);

  document.getElementById('dashContent').innerHTML=html;
}

// ===== Helper: Format Full Number =====
function fmtFull(n) {
  if(n==null) return '-';
  return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});
}

// ===== Toggle Stores =====
function toggleStores() {
  const body = document.getElementById('storeBody');
  const arrow = document.getElementById('storeArrow');
  if(body.classList.contains('open')) {
    body.classList.remove('open');
    arrow.textContent = '▶';
  } else {
    body.classList.add('open');
    arrow.textContent = '▼';
  }
}

// ===== Show All Stores =====
function showAllStores(op) {
  const storeData = DX_DETAIL[op] || [];
  const tbody = document.getElementById('storeTbody');
  let rows = '';
  for(const st of storeData) {
    rows += '<tr><td title="' + st.n + '">' + st.n + '</td><td>' + st.s + '</td><td>' + st.c + '</td><td>' + st.cty + '</td></tr>';
  }
  tbody.innerHTML = rows;
  const btn = document.getElementById('showAllBtn');
  if(btn) btn.style.display = 'none';
}

// ===== Bar Chart Render =====
function renderBarChart(op) {
  const {pts} = calcProjRanks();
  
  // Calculate rankings for the 5 dimensions
  const dimensions = [
    {label: 'GTV达成率', getVal: (o) => PERF[o].gtv_rate},
    {label: 'CPC达成率', getVal: (o) => PERF[o].cpc_rate},
    {label: 'MEM续约率', getVal: (o) => PERF[o].mem_renewal},
    {label: '项目总积分', getVal: (o) => pts[o]},
    {label: '综合得分', getVal: (o) => {
      const gtvR = PERF[o].gtv_rate;
      const cpcR = PERF[o].cpc_rate;
      const memR = PERF[o].mem_renewal;
      return gtvR * 0.4 + cpcR * 0.3 + memR * 0.3;
    }},
  ];
  
  let h = '<div class="section"><div class="section-title">📊 全区对比</div>';
  
  for(const dim of dimensions) {
    // Get all values and rank them (desc)
    const ranked = [...OPS].sort((a,b) => dim.getVal(b) - dim.getVal(a));
    
    h += '<div class="bar-section"><div class="bar-title">' + dim.label + '</div>';
    
    for(let i=0; i<ranked.length; i++) {
      const o = ranked[i];
      const rank = i + 1;
      const isSelf = (o === op);
      const barWidth = Math.round((ranked.length - i) / ranked.length * 100);
      
      h += '<div class="bar-row">';
      h += '<div class="bar-label">#' + rank + '</div>';
      h += '<div class="bar-track">';
      h += '<div class="bar-fill ' + (isSelf ? 'self' : 'other') + '" style="width:' + barWidth + '%">';
      if(isSelf) {
        h += '<span class="bar-name">' + op + '</span>';
      }
      h += '</div>';
      h += '</div>';
      h += '</div>';
    }
    
    h += '</div>';
  }
  
  h += '</div>';
  return h;
}

</script>
