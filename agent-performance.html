<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤闽浙代运营商绩效管理看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
h1,h2,h3{font-weight:700}

/* Header */
.hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:20px;flex:1}
.hdr .dt{font-size:13px;opacity:.85}
.hdr-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:13px;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.3)}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 16px;background:#fff;border-bottom:1px solid #e0e0e0}
.tab-btn{padding:12px 24px;border:none;background:none;font-size:14px;cursor:pointer;color:#666;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:#1a237e;border-bottom-color:#1a237e;font-weight:600}
.tab-btn:hover{color:#1a237e}

/* Content */
.ct{padding:16px;max-width:1280px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.sum-card{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sum-card .lb{font-size:12px;color:#999;margin-bottom:4px}
.sum-card .val{font-size:30px;font-weight:800}
.sum-card .val.g{color:#16a34a}.val.b{color:#dc2626}

/* Rank Cards */
.rank-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #e0e0e0}
.rank-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1)}
.rank-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rank-bad{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.rank-bad.r1{background:#1a73e8}.rank-bad.r2{background:#34a853}.rank-bad.r3{background:#fbbc04}
.rank-bad.r4,.rank-bad.r5,.rank-bad.r6{background:#ea4335}
.rank-nm{font-size:18px;font-weight:600}
.rank-av{font-size:12px;color:#999}

/* Metric Grid */
.mg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.mi{text-align:center;padding:8px 4px;border-radius:8px;background:#f8f9fa}
.mi-lb{font-size:10px;color:#999;margin-bottom:2px}
.mi-vl{font-size:15px;font-weight:600}
.mi-vl.g{color:#16a34a}.mi-vl.m{color:#ca8a04}.mi-vl.b{color:#dc2626}
.mi-rk{font-size:11px;color:#999}
.mi-rk.t{color:#16a34a;font-weight:600}.mi-rk.bt{color:#dc2626;font-weight:600}

/* Monthly Score */
.score-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.score-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.score-nm{font-size:18px;font-weight:600}
.score-total{font-size:32px;font-weight:800;color:#1a237e}
.score-bar{display:flex;height:24px;border-radius:12px;overflow:hidden;margin-bottom:10px}
.score-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}
.score-row:last-child{border-bottom:none}
.score-row .dim{font-size:13px;color:#555}
.score-row .pct{font-size:12px;color:#999}
.score-row .pts{font-size:14px;font-weight:600}
.score-row .pts.g{color:#16a34a}.pts.r{color:#dc2626}

/* Rules */
.rules-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.rules-card h3{font-size:15px;margin-bottom:12px}
.rules-table{width:100%;border-collapse:collapse}
.rules-table th{background:#f5f5f5;padding:8px;font-size:12px;text-align:left}
.rules-table td{padding:8px;border-bottom:1px solid #eee;font-size:13px}
.rules-table input{width:60px;padding:4px;border:1px solid #ddd;border-radius:4px;text-align:center}
.rules-table select{padding:4px;border:1px solid #ddd;border-radius:4px}
.rules-save{background:#1a237e;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px}
.rules-save:hover{background:#283593}

/* Table */
.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.data-table th{background:#1a237e;color:#fff;padding:10px 8px;font-size:12px;text-align:center}
.data-table td{padding:8px;text-align:center;font-size:13px;border-bottom:1px solid #eee}
.data-table tr:hover{background:#f8f9ff}

.ftr{text-align:center;padding:16px;font-size:11px;color:#999}
</style>
</head>
<body>
<div class="hdr">
  <h1>🏆 粤闽浙代运营商绩效管理看板</h1>
  <div class="dt">数据截至 2026-05-27</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('weekly')">📊 周排名</button>
  <button class="tab-btn" onclick="switchTab('monthly')">📈 月度评分</button>
  <button class="tab-btn" onclick="switchTab('rules')">⚙️ 评分规则</button>
  <button class="tab-btn" onclick="switchTab('table')">📋 表格视图</button>
</div>

<div class="ct">
  <!-- Weekly Tab -->
  <div class="tab-content active" id="weekly">
    <div class="summary" id="weekSummary"></div>
    <div id="weekRanking"></div>
  </div>

  <!-- Monthly Tab -->
  <div class="tab-content" id="monthly">
    <div class="summary" id="monthSummary"></div>
    <div id="monthScores"></div>
  </div>

  <!-- Rules Tab -->
  <div class="tab-content" id="rules">
    <div class="rules-card">
      <h3>评分规则配置</h3>
      <p style="font-size:13px;color:#666;margin-bottom:12px">修改规则后点击「应用规则」，所有数据自动重算</p>
      <table class="rules-table">
        <thead><tr><th>维度</th><th>指标</th><th>权重%</th><th>达标线</th><th>满分线</th><th>满分</th></tr></thead>
        <tbody id="rulesTable"></tbody>
      </table>
      <button class="rules-save" onclick="applyRules()">应用规则</button>
    </div>
  </div>

  <!-- Table Tab -->
  <div class="tab-content" id="table">
    <div id="tableView"></div>
  </div>
</div>

<div class="ftr">
  数据来源：PC业绩看板 · 欧若拉待办 · 好店底表 · BML · 经营评分 · 好店动销
</div>

<script>
